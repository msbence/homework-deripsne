plugin: 'amazon.aws.aws_ec2'
regions:
  - eu-west-1
filters:
  tag:Name: bencemadarasz-grafana
keyed_groups:
  - key: ec2_tags['Name']
    prefix: name
hostnames:
  - instance-id
compose:
  ansible_host: instance_id
  ansible_connection: "'aws_ssm'" # using SSM. This is painfully slow, use a bastion host / CI worker in prod.
  ansible_aws_ssm_bucket_name: "'bencemadarasz-hw-ssm-store'"
  ansible_aws_ssm_region: "'eu-west-1'"
