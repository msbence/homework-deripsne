- name: Create alloy user
  ansible.builtin.user:
    name: alloy
    shell: /bin/false
    create_home: false
    comment: "alloy user"

- name: Add alloy user to systemd-journal group
  ansible.builtin.user:
    name: alloy
    groups: systemd-journal
    append: true

- name: Create alloy directory
  ansible.builtin.file:
    path: "/monitoring/alloy"
    state: directory
    owner: alloy
    group: alloy
    mode: "0775"

- name: Check if version file exists
  ansible.builtin.stat:
    path: "/monitoring/alloy/version"
  register: base_base_alloy_version_file

- name: Create initial version file
  ansible.builtin.file:
    path: "/monitoring/alloy/version"
    state: touch
    owner: alloy
    group: alloy
    mode: "0775"
  when: not base_base_alloy_version_file.stat.exists

- name: Read local alloy version
  ansible.builtin.slurp:
    src: "/monitoring/alloy/version"
  register: base_alloy_version_info

- name: Get latest release
  delegate_to: localhost
  run_once: true
  block:
    - name: Fetch latest release
      ansible.builtin.uri:
        url: "https://api.github.com/repos/grafana/alloy/releases/latest"
        method: GET
        return_content: true
        status_code: 200
        body_format: json
      register: base_alloy_latest_release
      until: base_alloy_latest_release.status == 200
      retries: 5

    - name: "Set alloy version to {{ base_alloy_latest_release.json.tag_name[1:] }}"
      ansible.builtin.set_fact:
        base_alloy_version: "{{ base_alloy_latest_release.json.tag_name[1:] }}"

- name: Download latest alloy binary
  when: base_alloy_version != base_alloy_version_info['content']
  ansible.builtin.unarchive:
    remote_src: true
    src: "https://github.com/grafana/alloy/releases/download/v{{ base_alloy_version }}/alloy-linux-amd64.zip"
    dest: "/monitoring/alloy/"
    keep_newer: true
  register: base_alloy_downloaded
  notify: Restart alloy service

- name: Register version in file  # noqa no-handler
  ansible.builtin.copy:
    content: "{{ base_alloy_version }}"
    dest: /monitoring/alloy/version
    mode: "0775"
  when: base_alloy_downloaded.changed

- name: Install alloy service
  ansible.builtin.copy:
    src: "alloy.service"
    dest: "/etc/systemd/system/alloy.service"
    mode: "0775"
  notify: Restart alloy service

- name: Install alloy configuration
  ansible.builtin.template:
    src: "config.alloy.j2"
    dest: "/monitoring/alloy/config.alloy"
    mode: "0775"
  notify: Restart alloy service
